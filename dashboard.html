<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واجهة الألعاب</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f7fa; padding: 15px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        .dashboard-container { background-color: #ffffff; width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        .header-balance-section { display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 12px; margin-bottom: 5px; }
        .balance-box { background-color: #2c3e50; color: #ffffff; flex: 1; padding: 15px 20px; border-radius: 16px; text-align: right; display: flex; flex-direction: column; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        .balance-title { font-size: 14px; color: #bdc3c7; margin-bottom: 5px; }
        .balance-amount { font-size: 24px; font-weight: bold; }
        .balance-buttons { display: flex; flex-direction: column; gap: 8px; }
        .btn-balance-action { background-color: #3498db; color: white; border: none; padding: 10px 30px; border-radius: 20px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(52, 152, 219, 0.2); text-align: center; min-width: 100px; }
        .separator { width: 100%; height: 2px; background-color: #e2e8f0; margin-bottom: 5px; }
        .main-games-grid { display: flex; flex-direction: column; gap: 15px; }
        .big-game-card { position: relative; width: 100%; height: 180px; border-radius: 24px; overflow: hidden; box-shadow: 0 6px 15px rgba(0,0,0,0.1); cursor: pointer; }
        .big-game-card img { width: 100%; height: 100%; object-fit: cover; }
        .big-game-title { position: absolute; bottom: 20px; right: 20px; color: white; font-size: 26px; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .small-games-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .small-game-card { background-color: #ffffff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #edf2f7; display: flex; flex-direction: column; cursor: pointer; }
        .small-game-thumb { position: relative; height: 110px; width: 100%; }
        .small-game-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .win-badge { position: absolute; bottom: 5px; right: 5px; background-color: rgba(0, 0, 0, 0.6); color: #ffffff; font-size: 11px; padding: 2px 6px; border-radius: 4px; }
        .small-game-info { padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .small-game-name { font-size: 14px; font-weight: bold; color: #2c3e50; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="header-balance-section">
            <div class="balance-buttons">
                <button class="btn-balance-action" onclick="goToWithdraw()">سحب</button>
                <button class="btn-balance-action" onclick="goToDeposit()">إيداع</button>
            </div>
            <div class="balance-box">
                <span class="balance-title">الرصيد الحالي</span>
                <span class="balance-amount" id="user-balance">جاري التحميل...</span>
            </div>
        </div>

        <div class="separator"></div>

        <div class="main-games-grid">
            <div class="big-game-card" onclick="window.location.href='crash_game.html?id=' + USER_ID">
                <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?w=500">
                <div class="big-game-title">Crash</div>
            </div>
            
            <div class="big-game-card" onclick="window.location.href='apple_game.html?id=' + USER_ID">
                <img src="https://images.unsplash.com/photo-1619546813926-a78fa6372cd2?w=500">
                <div class="big-game-title">Apple Of Fortune</div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            databaseURL: "https://xpetvip-9450f-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        let USER_ID = urlParams.get('id') || localStorage.getItem("user_id");
        
        const balanceEl = document.getElementById('user-balance');

        if (!USER_ID || USER_ID === "undefined" || USER_ID === "null" || USER_ID === "غير معروف") {
            balanceEl.innerText = "0.00 جنيه";
            window.location.replace("index.html");
        } else {
            localStorage.setItem("user_id", USER_ID);

            database.ref('User/' + USER_ID + '/balance').on('value', (snapshot) => {
                if (snapshot.exists()) {
                    let parsedBalance = parseFloat(snapshot.val());
                    balanceEl.innerText = isNaN(parsedBalance) ? "0.00 جنيه" : parsedBalance.toFixed(2) + " جنيه";
                } else {
                    balanceEl.innerText = "0.00 جنيه";
                    database.ref('User/' + USER_ID).update({ balance: 0 });
                }
            }, (error) => {
                balanceEl.innerText = "خطأ اتصال";
            });
        }

        function goToDeposit() {
            window.location.href = "deposit.html?id=" + USER_ID;
        }

        function goToWithdraw() {
            window.location.href = "withdraw.html?id=" + USER_ID;
        }
    </script>
</body>
</html>
